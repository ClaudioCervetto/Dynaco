<!doctype html>
<html lang=it>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Vision</title>
<style>:root{--bg-color:#f8f6f0;--stroke-color:#222222}body,html{margin:0;padding:0;background-color:var(--bg-color);display:flex;justify-content:center;align-items:center;height:100vh}.milestone-container{width:500px;height:500px;position:relative;display:flex;justify-content:center;align-items:center}.has-shadow .milestone-node{filter:drop-shadow(0px 10px 15px rgba(0,0,0,.3))}@keyframes eye-focus{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.75)}}@keyframes horizon-spin{100%{transform:rotate(360deg)}}@keyframes horizon-spin-reverse{100%{transform:rotate(-360deg)}}@keyframes vision-rays{0%{stroke-dasharray:0 40;stroke-dashoffset:0;opacity:0}20%{opacity:1}50%{stroke-dasharray:40 0;stroke-dashoffset:0;opacity:1}80%{opacity:1}100%{stroke-dasharray:0 40;stroke-dashoffset:-40;opacity:0}}@keyframes pupil-pulse{0%,100%{transform:scale(.9)}50%{transform:scale(1.1)}}.eye-contour{animation:eye-focus 6s ease-in-out infinite;transform-origin:center;transform-box:fill-box}.spin-inner{animation:horizon-spin 12s linear infinite;transform-origin:center;transform-box:fill-box}.spin-outer{animation:horizon-spin-reverse 18s linear infinite;transform-origin:center;transform-box:fill-box}.ray-1{animation:vision-rays 3s cubic-bezier(.4,0,.2,1) infinite}.ray-2{animation:vision-rays 3s cubic-bezier(.4,0,.2,1) infinite 1s}.ray-3{animation:vision-rays 3s cubic-bezier(.4,0,.2,1) infinite 2s}.pupil{animation:pupil-pulse 4s ease-in-out infinite;transform-origin:center;transform-box:fill-box}</style>
</head>
<body>
<div class=milestone-container>
<svg width=100% height=100% viewBox="-50 -50 100 100" style=overflow:visible>
<defs>
<filter id=sketch x=-50% y=-50% width=200% height=200%>
<feTurbulence type=fractalNoise baseFrequency=0.04 numOctaves=2 result=noise />
<feDisplacementMap in=SourceGraphic in2=noise scale=3 xChannelSelector=R yChannelSelector=G />
</filter>
</defs>
<g id=tappa-14 class=milestone-node filter=url(#sketch)>
<g fill=none stroke=var(--stroke-color) stroke-width=2.5 stroke-linecap=round>
<line x1=-8 y1=-8 x2=-25 y2=-25 class=ray-1 />
<line x1=8 y1=8 x2=25 y2=25 class=ray-1 />
<line x1=8 y1=-8 x2=25 y2=-25 class=ray-2 />
<line x1=-8 y1=8 x2=-25 y2=25 class=ray-2 />
<line x1=12 y1=0 x2=32 y2=0 class=ray-3 />
<line x1=-12 y1=0 x2=-32 y2=0 class=ray-3 />
<line x1=0 y1=12 x2=0 y2=28 class=ray-1 style=animation-delay:1.5s />
<line x1=0 y1=-12 x2=0 y2=-28 class=ray-1 style=animation-delay:1.5s />
</g>
<g class=eye-contour fill=none stroke=var(--stroke-color)>
<path d="M -40 0 C -20 -22, 20 -22, 40 0 C 20 22, -20 22, -40 0" stroke-width=3 stroke-linejoin=round />
<path d="M -38 0 C -18 -18, 18 -18, 38 0 C 18 18, -18 18, -38 0" stroke-width=1.5 stroke-linejoin=round />
</g>
<circle cx=0 cy=0 r=14 fill=none stroke=var(--stroke-color) stroke-width=2.5 stroke-dasharray="6 8" class=spin-outer />
<circle cx=0 cy=0 r=10 fill=none stroke=var(--stroke-color) stroke-width=2 stroke-dasharray="4 6" class=spin-inner />
<circle cx=0 cy=0 r=5 fill=var(--stroke-color) class=pupil />
</g>
</svg>
</div>
</body>
</html>
