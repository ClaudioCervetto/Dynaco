<div id=mobile-nav-controls>
<button id=nav-up class=nav-btn aria-label="Scorri Avanti">

</button>
<button id=nav-down class=nav-btn aria-label="Scorri Indietro">

<defs>

<stop offset=100% stop-color=black stop-opacity=0 />

</mask>
</defs>
<g id=mountain-layer>

<line x1=45 y1=-30 x2=0 y2=30 stroke=var(--stroke-color) stroke-width=1.5 />

<line x1=15 y1=-45 x2=0 y2=30 stroke=var(--stroke-color) stroke-width=1.5 />

<circle cx=0 cy=-35 r=6 fill=none stroke=var(--stroke-color) stroke-width=3 />
<line x1=0 y1=-29 x2=0 y2=-12 stroke=var(--stroke-color) stroke-width=3 stroke-linecap=round />
