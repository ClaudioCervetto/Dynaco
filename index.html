<html lang=it>

<div id=start-screen>

<line x1=-15 y1=-45 x2=0 y2=30 stroke=var(--stroke-color) stroke-width=1.5 />
<line x1=15 y1=-45 x2=0 y2=30 stroke=var(--stroke-color) stroke-width=1.5 />
</g>
<circle cx=0 cy=-35 r=6 fill=none stroke=var(--stroke-color) stroke-width=3 />
<line x1=0 y1=-29 x2=0 y2=-12 stroke=var(--stroke-color) stroke-width=3 stroke-linecap=round />
<line id=arm-back x1=0 y1=-26 x2=0 y2=-10 stroke=var(--stroke-color) stroke-width=3 stroke-linecap=round />
<line id=leg-back x1=0 y1=-12 x2=0 y2=0 stroke=var(--stroke-color) stroke-width=3 stroke-linecap=round />

</g>

<g id=bg-grid></g>

<div style=position:relative;display:flex;align-items:center;justify-content:center;width:100%;height:100%>
<div style=position:relative;display:inline-block>
