<!doctype html>
<html lang=it>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Synthesis</title>
<style>:root{--bg-color:#f8f6f0;--stroke-color:#222222}body,html{margin:0;padding:0;background-color:var(--bg-color);display:flex;justify-content:center;align-items:center;height:100vh}.milestone-container{width:500px;height:500px;position:relative}@keyframes flow-wave{to{stroke-dashoffset:-80}}@keyframes draw-wave{0%{stroke-dasharray:0 100;opacity:0}30%{opacity:1}100%{stroke-dasharray:100 0;opacity:1}}@keyframes noise-flicker{0%,100%{opacity:0}10%,40%{opacity:.8}20%,60%{opacity:.2}80%{opacity:1}}@keyframes focus-in{0%,100%{transform:scale(1.1);opacity:0}30%,70%{transform:scale(1);opacity:1}}.wave-core{stroke-dasharray:20 10;animation:flow-wave 4s linear infinite}.noise-1{animation:noise-flicker 2s infinite}.noise-2{animation:noise-flicker 3s infinite .5s}.noise-3{animation:noise-flicker 2.5s infinite 1.2s}.focus-bracket{animation:focus-in 4s ease-in-out infinite;transform-origin:center;transform-box:fill-box}</style>
</head>
<body>
<div class=milestone-container>
<svg width=100% height=100% viewBox="-50 -50 100 100" style=overflow:visible>
<defs>
<filter id=sketch x=-50% y=-50% width=200% height=200%>
<feTurbulence type=fractalNoise baseFrequency=0.08 numOctaves=4 result=noise />
<feDisplacementMap in=SourceGraphic in2=noise scale=2.5 xChannelSelector=R yChannelSelector=G />
</filter>
</defs>
<g id=tappa-2 filter=url(#sketch)>
<g class=noise-1>
<line x1=-25 y1=-20 x2=-20 y2=-25 stroke=var(--stroke-color) stroke-width=1.5 stroke-linecap=round />
<circle cx=25 cy=20 r=1.5 fill=var(--stroke-color) />
</g>
<g class=noise-2>
<line x1=22 y1=-22 x2=28 y2=-18 stroke=var(--stroke-color) stroke-width=1.5 stroke-linecap=round />
<line x1=-28 y1=18 x2=-22 y2=22 stroke=var(--stroke-color) stroke-width=1.5 stroke-linecap=round />
</g>
<g class=noise-3>
<circle cx=-15 cy=25 r=1 fill=var(--stroke-color) />
<circle cx=15 cy=-28 r=2 fill=var(--stroke-color) />
<line x1=0 y1=-30 x2=0 y2=-26 stroke=var(--stroke-color) stroke-width=1.5 stroke-linecap=round />
</g>
<g class=focus-bracket>
<path d="M -15 -15 L -10 -10" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round />
<path d="M 15 15 L 10 10" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round />
</g>
<g class=focus-bracket style=animation-delay:2s>
<path d="M 15 -15 L 10 -10" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round />
<path d="M -15 15 L -10 10" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round />
</g>
<path d="M -30 0 C -15 -25, -15 25, 0 0 C 15 -25, 15 25, 30 0" fill=none stroke=var(--stroke-color) stroke-width=3 stroke-linecap=round stroke-linejoin=round class=wave-core />
</g>
</svg>
</div>
</body>
</html>
