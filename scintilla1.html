<!doctype html>
<html lang=it>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Aetheris - Tappa 11: La Scintilla (Solo Scintilla, Stile Sketch)</title>
<style>:root{--bg-color:#f8f6f0;--stroke-color:#222222}body,html{margin:0;padding:0;background-color:var(--bg-color);display:flex;justify-content:center;align-items:center;height:100vh}.milestone-container{width:500px;height:500px;position:relative;display:flex;justify-content:center;align-items:center}.has-shadow .milestone-node{filter:drop-shadow(0px 10px 15px rgba(0,0,0,.3))}.has-shadow .node-shape{filter:drop-shadow(inset 0px 2px 4px rgba(255,255,255,.7))}@keyframes spark-pulse{0%,100%{transform:scale(0);opacity:0}15%{transform:scale(1.6);opacity:1}30%,70%{transform:scale(1);opacity:1}85%{transform:scale(1.2);opacity:1}}@keyframes resonance-wave{0%{transform:scale(.2);opacity:0;stroke-width:3}20%{opacity:.8}80%{transform:scale(2.5);opacity:0;stroke-width:.5}100%{transform:scale(2.5);opacity:0}}.anim-spark-main{animation:spark-pulse 4s cubic-bezier(.175,.885,.32,1.275) infinite;transform-origin:center;transform-box:fill-box}.anim-spark-sec{animation:spark-pulse 4s cubic-bezier(.175,.885,.32,1.275) infinite .2s;transform-origin:center;transform-box:fill-box}.resonance-1{animation:resonance-wave 4s ease-out infinite .3s;transform-origin:center;transform-box:fill-box}.resonance-2{animation:resonance-wave 4s ease-out infinite 1.2s;transform-origin:center;transform-box:fill-box}</style>
</head>
<body>
<div class=milestone-container>
<svg class=has-shadow width=100% height=100% viewBox="-50 -50 100 100" style=overflow:visible>
<defs>
<filter id=sketch-filter x=-50% y=-50% width=200% height=200%>
<feTurbulence type=fractalNoise baseFrequency=0.08 numOctaves=4 result=noise />
<feDisplacementMap in=SourceGraphic in2=noise scale=3 xChannelSelector=R yChannelSelector=G />
</filter>
</defs>
<g id=tappa-11 class=milestone-node filter=url(#sketch-filter)>
<circle cx=0 cy=0 r=12 fill=none stroke=var(--stroke-color) class=resonance-1 />
<circle cx=0 cy=0 r=12 fill=none stroke=var(--stroke-color) class=resonance-2 />
<g>
<path class="anim-spark-main node-shape" d="M 0 -15 L 3 -4 L 14 0 L 3 4 L 0 15 L -3 4 L -14 0 L -3 -4 Z" fill=var(--stroke-color) stroke=var(--stroke-color) stroke-width=1.5 stroke-linejoin=round />
<path class=anim-spark-sec d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z" fill=var(--bg-color) stroke=var(--stroke-color) stroke-width=2 stroke-linejoin=round transform=rotate(45) />
<circle cx=0 cy=0 r=2.5 fill=var(--bg-color) class=anim-spark-main />
</g>
</g>
</svg>
</div>
</body>
</html>
