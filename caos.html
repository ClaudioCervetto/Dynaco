<!doctype html>
<html lang=it>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Chaos</title>
<style>:root{--bg-color:#f8f6f0;--stroke-color:#222222}body,html{margin:0;padding:0;background-color:var(--bg-color);display:flex;justify-content:center;align-items:center;height:100vh}.milestone-container{width:500px;height:500px;position:relative}@keyframes draw-in-out{0%{stroke-dasharray:0 100;stroke-dashoffset:0;opacity:0}20%{opacity:1}50%{stroke-dasharray:100 0;stroke-dashoffset:0}80%{opacity:1}100%{stroke-dasharray:0 100;stroke-dashoffset:-100;opacity:0}}@keyframes blink-chaotic{0%,100%{opacity:0}10%,30%,60%{opacity:1}20%,40%,80%{opacity:.3}}@keyframes spawn-pop{0%,100%{transform:scale(0);opacity:0}20%,80%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:1}}.draw-1{animation:draw-in-out 3s ease-in-out infinite}.draw-2{animation:draw-in-out 4s ease-in-out infinite 1s}.draw-3{animation:draw-in-out 2.5s ease-in-out infinite .5s}.blink-1{animation:blink-chaotic 2s infinite}.blink-2{animation:blink-chaotic 3.5s infinite 1s}.pop-1{animation:spawn-pop 4s infinite;transform-origin:center;transform-box:fill-box}.pop-2{animation:spawn-pop 3s infinite 1.5s;transform-origin:center;transform-box:fill-box}</style>
</head>
<body>
<div class=milestone-container>
<svg width=100% height=100% viewBox="-50 -50 100 100" style=overflow:visible>
<defs>
<filter id=sketch x=-50% y=-50% width=200% height=200%>
<feTurbulence type=fractalNoise baseFrequency=0.08 numOctaves=4 result=noise />
<feDisplacementMap in=SourceGraphic in2=noise scale=2.5 xChannelSelector=R yChannelSelector=G />
</filter>
</defs>
<g id=tappa-1 filter=url(#sketch)>
<path d="M -15 -5 L -5 -20 L 5 -10" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round stroke-linejoin=round class=draw-1 />
<path d="M 10 -15 L 20 -5 L 12 8" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round stroke-linejoin=round class=draw-2 />
<path d="M -20 10 L -10 20 L 5 15" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round stroke-linejoin=round class=draw-3 />
<line x1=-8 y1=2 x2=8 y2=-2 stroke=var(--stroke-color) stroke-width=2.5 stroke-linecap=round class=blink-1 />
<line x1=-2 y1=-8 x2=2 y2=8 stroke=var(--stroke-color) stroke-width=2.5 stroke-linecap=round class=blink-2 />
<g class=pop-1>
<line x1=-24 y1=-24 x2=-18 y2=-18 stroke=var(--stroke-color) stroke-width=1.5 stroke-linecap=round />
<line x1=-18 y1=-24 x2=-24 y2=-18 stroke=var(--stroke-color) stroke-width=1.5 stroke-linecap=round />
</g>
<g class=pop-2>
<line x1=18 y1=18 x2=24 y2=24 stroke=var(--stroke-color) stroke-width=1.5 stroke-linecap=round />
<line x1=24 y1=18 x2=18 y2=24 stroke=var(--stroke-color) stroke-width=1.5 stroke-linecap=round />
</g>
<circle cx=22 cy=-20 r=2 fill=var(--stroke-color) class=blink-1 />
<circle cx=-20 cy=22 r=1.5 fill=var(--stroke-color) class=blink-2 />
<circle cx=0 cy=25 r=2.5 fill=none stroke=var(--stroke-color) stroke-width=1.5 class=pop-1 style=animation-delay:.8s />
</g>
</svg>
</div>
</body>
</html>
