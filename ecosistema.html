<!doctype html>
<html lang=it>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Ecosystem</title>
<style>:root{--bg-color:#f8f6f0;--stroke-color:#222222}body,html{margin:0;padding:0;background-color:var(--bg-color);display:flex;justify-content:center;align-items:center;height:100vh}.milestone-container{width:500px;height:500px;position:relative;display:flex;justify-content:center;align-items:center}@keyframes branch-flow{0%{stroke-dasharray:100;stroke-dashoffset:100;opacity:0}10%{opacity:1}50%{stroke-dashoffset:0;opacity:1}90%{stroke-dashoffset:0;opacity:1}100%{stroke-dashoffset:-100;opacity:0}}@keyframes trace-loop{to{stroke-dashoffset:-100}}@keyframes node-pulse{0%,100%{transform:scale(.6);opacity:.5;fill:var(--bg-color);stroke-width:1.5}50%{transform:scale(1.4);opacity:1;fill:var(--stroke-color);stroke-width:2.5}}@keyframes core-breathe{0%,100%{transform:scale(.95)}50%{transform:scale(1.1)}}.branch-1{animation:branch-flow 4s ease-in-out infinite}.branch-2{animation:branch-flow 4s ease-in-out infinite 1s}.branch-3{animation:branch-flow 4s ease-in-out infinite 2s}.branch-core{stroke-dasharray:30 70;animation:trace-loop 5s linear infinite}.node-1{animation:node-pulse 4s infinite;transform-origin:center;transform-box:fill-box}.node-2{animation:node-pulse 4s infinite 1s;transform-origin:center;transform-box:fill-box}.node-3{animation:node-pulse 4s infinite 2s;transform-origin:center;transform-box:fill-box}.core-solid{animation:core-breathe 4s ease-in-out infinite;transform-origin:center;transform-box:fill-box}</style>
</head>
<body>
<div class=milestone-container>
<svg width=100% height=100% viewBox="-50 -50 100 100" style=overflow:visible>
<defs>
<filter id=sketch x=-50% y=-50% width=200% height=200%>
<feTurbulence type=fractalNoise baseFrequency=0.04 numOctaves=2 result=noise />
<feDisplacementMap in=SourceGraphic in2=noise scale=3 xChannelSelector=R yChannelSelector=G />
</filter>
</defs>
<g id=tappa-13 class=milestone-node filter=url(#sketch)>
<g fill=none stroke=var(--stroke-color) stroke-width=1.5 opacity=0.25 stroke-linejoin=round>
<path d="M 0 -12 L 10.4 -6 L 10.4 6 L 0 12 L -10.4 6 L -10.4 -6 Z"/>
<path d="M 10.4 -6 L 20.8 -12 L 31.2 -6 L 31.2 6 L 20.8 12 L 10.4 6"/>
<path d="M -10.4 6 L -20.8 12 L -31.2 6 L -31.2 -6 L -20.8 -12 L -10.4 -6"/>
<path d="M 0 12 L 0 24 L 10.4 30 L 20.8 24 L 20.8 12"/>
<path d="M 20.8 -12 L 20.8 -24 L 10.4 -30 L 0 -24 L 0 -12"/>
<path d="M 31.2 6 L 41.6 12"/>
<path d="M -20.8 12 L -20.8 24"/>
<path d="M 20.8 24 L 20.8 36"/>
</g>
<g fill=none stroke=var(--stroke-color) stroke-width=3 stroke-linejoin=round stroke-linecap=round>
<path d="M 10.4 -6 L 20.8 -12 L 31.2 -6 L 31.2 6" pathLength=100 class=branch-1 />
<path d="M -10.4 -6 L -20.8 -12 L -31.2 -6 L -31.2 6 L -20.8 12" pathLength=100 class=branch-2 />
<path d="M 0 12 L 0 24 L 10.4 30 L 20.8 24" pathLength=100 class=branch-3 />
<path d="M 0 -12 L 10.4 -6 L 10.4 6 L 0 12 L -10.4 6 L -10.4 -6 Z" pathLength=100 class=branch-core />
</g>
<g stroke=var(--stroke-color)>
<circle cx=31.2 cy=6 r=2 class=node-1 />
<circle cx=-20.8 cy=12 r=2 class=node-2 />
<circle cx=20.8 cy=24 r=2 class=node-3 />
<circle cx=-31.2 cy=-6 r=1.5 fill=var(--bg-color) stroke-width=1.5 opacity=0.4 />
<circle cx=20.8 cy=-24 r=1.5 fill=var(--bg-color) stroke-width=1.5 opacity=0.4 />
</g>
<g class=core-solid>
<polygon points="0,-12 10.4,-6 10.4,6 0,12 -10.4,6 -10.4,-6" fill=var(--stroke-color) stroke=var(--stroke-color) stroke-width=3 stroke-linejoin=round />
<circle cx=0 cy=0 r=3 fill=var(--bg-color) />
</g>
</g>
</svg>
</div>
</body>
</html>
