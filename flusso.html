<!doctype html>
<html lang=it>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Flow</title>
<style>:root{--bg-color:#f8f6f0;--stroke-color:#222222}body,html{margin:0;padding:0;background-color:var(--bg-color);display:flex;justify-content:center;align-items:center;height:100vh}.milestone-container{width:500px;height:500px;position:relative}.has-shadow .milestone-node{filter:drop-shadow(0px 8px 12px rgba(0,0,0,.3))}.has-shadow .node-shape{filter:drop-shadow(inset 0px 2px 4px rgba(255,255,255,.7))}@keyframes flow-stream{to{stroke-dashoffset:-100}}@keyframes dissolve-barrier{0%,100%{opacity:.1;transform:scaleX(1)}50%{opacity:.7;transform:scaleX(.9)}}@keyframes breathe-ripple{0%{transform:scale(.3);opacity:0;stroke-width:2}20%{opacity:.8}100%{transform:scale(2.5);opacity:0;stroke-width:.5}}@keyframes gentle-breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.15)}}.barrier{animation:dissolve-barrier 4s ease-in-out infinite;transform-origin:center}.stream-group{animation:gentle-breathe 4s ease-in-out infinite;transform-origin:center}.flow-1{stroke-dasharray:12 12;animation:flow-stream 3s linear infinite}.flow-2{stroke-dasharray:25 15;animation:flow-stream 4.5s linear infinite}.flow-3{stroke-dasharray:8 16;animation:flow-stream 2.5s linear infinite}.flow-4{stroke-dasharray:20 20;animation:flow-stream 4s linear infinite}.ripple-1{animation:breathe-ripple 4s cubic-bezier(.25,.46,.45,.94) infinite;transform-origin:center;transform-box:fill-box}.ripple-2{animation:breathe-ripple 4s cubic-bezier(.25,.46,.45,.94) infinite 2s;transform-origin:center;transform-box:fill-box}</style>
</head>
<body>
<div class=milestone-container>
<svg width=100% height=100% viewBox="-50 -50 100 100" style=overflow:visible>
<defs>
<filter id=sketch x=-50% y=-50% width=200% height=200%>
<feTurbulence type=fractalNoise baseFrequency=0.06 numOctaves=3 result=noise />
<feDisplacementMap in=SourceGraphic in2=noise scale=2 xChannelSelector=R yChannelSelector=G />
</filter>
</defs>
<g id=tappa-4 class=milestone-node filter=url(#sketch)>
<circle cx=0 cy=0 r=10 fill=none stroke=var(--stroke-color) class=ripple-1 />
<circle cx=0 cy=0 r=10 fill=none stroke=var(--stroke-color) class=ripple-2 />
<g class=barrier>
<path d="M -14 -22 L -20 -22 L -20 22 L -14 22" fill=none stroke=var(--stroke-color) stroke-width=1.5 stroke-dasharray="2 3" stroke-linejoin=round />
<path d="M 14 -22 L 20 -22 L 20 22 L 14 22" fill=none stroke=var(--stroke-color) stroke-width=1.5 stroke-dasharray="2 3" stroke-linejoin=round />
</g>
<g class=stream-group>
<path d="M -40 -15 C -15 -25, 15 -5, 40 -15" fill=none stroke=var(--stroke-color) stroke-width=0.5 opacity=0.3 />
<path d="M -40 -15 C -15 -25, 15 -5, 40 -15" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round class=flow-1 />
<path d="M -40 -5 C -15 -15, 15 5, 40 -5" fill=none stroke=var(--stroke-color) stroke-width=0.5 opacity=0.3 />
<path d="M -40 -5 C -15 -15, 15 5, 40 -5" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round class=flow-2 />
<path d="M -40 5 C -15 -5, 15 15, 40 5" fill=none stroke=var(--stroke-color) stroke-width=0.5 opacity=0.3 />
<path d="M -40 5 C -15 -5, 15 15, 40 5" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round class=flow-3 />
<path d="M -40 15 C -15 5, 15 25, 40 15" fill=none stroke=var(--stroke-color) stroke-width=0.5 opacity=0.3 />
<path d="M -40 15 C -15 5, 15 25, 40 15" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round class=flow-4 />
</g>
</g>
</svg>
</div>
</body>
</html>
