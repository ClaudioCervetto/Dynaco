<!doctype html>
<html lang=it>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Adaptation</title>
<style>:root{--bg-color:#f8f6f0;--stroke-color:#222222}body,html{margin:0;padding:0;background-color:var(--bg-color);display:flex;justify-content:center;align-items:center;height:100vh}.milestone-container{width:500px;height:500px;position:relative}@keyframes market-rotation{0%,10%{transform:rotate(0)}20%,35%{transform:rotate(90deg)}45%,60%{transform:rotate(45deg)}70%,85%{transform:rotate(180deg)}100%{transform:rotate(360deg)}}@keyframes us-adaptation{0%,12%{transform:rotate(0) scale(1)}18%,37%{transform:rotate(90deg) scale(1.2)}43%,62%{transform:rotate(45deg) scale(1)}68%,87%{transform:rotate(180deg) scale(1.2)}100%,98%{transform:rotate(360deg) scale(1)}}@keyframes others-lag{0%{transform:rotate(0);opacity:.2}25%{transform:rotate(70deg);opacity:.4}50%{transform:rotate(130deg);opacity:.2}75%{transform:rotate(210deg);opacity:.4}100%{transform:rotate(330deg);opacity:.2}}@keyframes structure-pulse{0%,100%{stroke-width:1.5}50%{stroke-width:3}}.market-ring{animation:market-rotation 8s cubic-bezier(.68,-.55,.265,1.55) infinite;transform-origin:center;transform-box:fill-box}.us-core{animation:us-adaptation 8s cubic-bezier(.19,1,.22,1) infinite;transform-origin:center;transform-box:fill-box}.others-ring{animation:others-lag 12s linear infinite;transform-origin:center;transform-box:fill-box}.pulse-line{animation:structure-pulse 2s ease-in-out infinite}</style>
</head>
<body>
<div class=milestone-container>
<svg width=100% height=100% viewBox="-50 -50 100 100" style=overflow:visible>
<defs>
<filter id=sketch x=-50% y=-50% width=200% height=200%>
<feTurbulence type=fractalNoise baseFrequency=0.08 numOctaves=4 result=noise />
<feDisplacementMap in=SourceGraphic in2=noise scale=2.5 xChannelSelector=R yChannelSelector=G />
</filter>
</defs>
<g id=tappa-5 filter=url(#sketch)>
<g class=others-ring>
<circle cx=0 cy=0 r=30 fill=none stroke=var(--stroke-color) stroke-width=1 stroke-dasharray="2 6" opacity=0.3 />
<line x1=0 y1=-32 x2=0 y2=-28 stroke=var(--stroke-color) stroke-width=1 />
<line x1=0 y1=28 x2=0 y2=32 stroke=var(--stroke-color) stroke-width=1 />
</g>
<g class=market-ring>
<polygon points="0,-25 21.6,-12.5 21.6,12.5 0,25 -21.6,12.5 -21.6,-12.5" fill=none stroke=var(--stroke-color) stroke-width=1.5 stroke-dasharray="8 4" class=pulse-line />
<circle cx=0 cy=-25 r=2.5 fill=none stroke=var(--stroke-color) stroke-width=1.5 />
<circle cx=0 cy=25 r=2.5 fill=none stroke=var(--stroke-color) stroke-width=1.5 />
</g>
<g class=us-core>
<path d="M 0 -10 L 8 0 L 0 10 L -8 0 Z" fill=var(--stroke-color) />
<line x1=0 y1=-25 x2=0 y2=25 stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round />
<circle cx=0 cy=0 r=14 fill=none stroke=var(--stroke-color) stroke-width=1 stroke-dasharray="1 3"/>
</g>
</g>
</svg>
</div>
</body>
</html>
