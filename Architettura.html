<!doctype html>
<html lang=it>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Architecture</title>
<style>:root{--bg-color:#f8f6f0;--stroke-color:#222222}body,html{margin:0;padding:0;background-color:var(--bg-color);display:flex;justify-content:center;align-items:center;height:100vh}.milestone-container{width:500px;height:500px;position:relative}.has-shadow .milestone-node{filter:drop-shadow(0px 8px 12px rgba(0,0,0,.3))}.has-shadow .node-shape{filter:drop-shadow(inset 0px 2px 4px rgba(255,255,255,.7))}@keyframes draw-structure{0%{stroke-dasharray:0 150;stroke-dashoffset:0;opacity:0}20%{opacity:1}50%{stroke-dasharray:150 0;stroke-dashoffset:0}80%{opacity:1}100%{stroke-dasharray:0 150;stroke-dashoffset:-150;opacity:0}}@keyframes draw-axes{0%{stroke-dasharray:0 80;stroke-dashoffset:0}50%{stroke-dasharray:80 0;stroke-dashoffset:0}100%{stroke-dasharray:0 80;stroke-dashoffset:-80}}@keyframes grid-march{to{stroke-dashoffset:-30}}@keyframes node-pulse{0%,100%{transform:scale(0);opacity:0}20%,80%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:1}}.draw-base{animation:draw-structure 5s cubic-bezier(.4,0,.2,1) infinite}.draw-inner{animation:draw-axes 5s cubic-bezier(.4,0,.2,1) infinite 1.5s}.grid-lines{animation:grid-march 4s linear infinite}.node-1{animation:node-pulse 4s infinite;transform-origin:center;transform-box:fill-box}.node-2{animation:node-pulse 4s infinite 1s;transform-origin:center;transform-box:fill-box}.node-3{animation:node-pulse 4s infinite 2s;transform-origin:center;transform-box:fill-box}</style>
</head>
<body>
<div class=milestone-container>
<svg width=100% height=100% viewBox="-50 -50 100 100" style=overflow:visible>
<defs>
<filter id=sketch x=-50% y=-50% width=200% height=200%>
<feTurbulence type=fractalNoise baseFrequency=0.08 numOctaves=4 result=noise />
<feDisplacementMap in=SourceGraphic in2=noise scale=2.5 xChannelSelector=R yChannelSelector=G />
</filter>
</defs>
<g id=tappa-3 class=milestone-node filter=url(#sketch)>
<line x1=-30 y1=20 x2=30 y2=-15 stroke=var(--stroke-color) stroke-width=0.8 stroke-dasharray="4 4" class=grid-lines />
<line x1=-30 y1=-15 x2=30 y2=20 stroke=var(--stroke-color) stroke-width=0.8 stroke-dasharray="4 4" class=grid-lines style=animation-direction:reverse />
<line x1=0 y1=-30 x2=0 y2=30 stroke=var(--stroke-color) stroke-width=0.8 stroke-dasharray="2 4" class=grid-lines />
<path d="M 0 -22 L 19 -11 L 19 11 L 0 22 L -19 11 L -19 -11 Z" fill=none stroke=var(--stroke-color) stroke-width=2.5 stroke-linejoin=round class=draw-base />
<path d="M 0 0 L 0 -22 M 0 0 L 19 11 M 0 0 L -19 11" fill=none stroke=var(--stroke-color) stroke-width=2 stroke-linecap=round class=draw-inner />
<circle cx=0 cy=0 r=3 fill=var(--bg-color) stroke=var(--stroke-color) stroke-width=1.5 class=node-1 />
<circle cx=0 cy=-22 r=2 fill=var(--stroke-color) class=node-2 />
<circle cx=0 cy=22 r=2 fill=var(--stroke-color) class=node-2 />
<circle cx=-19 cy=-11 r=1.5 fill=none stroke=var(--stroke-color) stroke-width=1.5 class=node-3 />
<circle cx=19 cy=11 r=1.5 fill=none stroke=var(--stroke-color) stroke-width=1.5 class=node-3 />
<path d="M -24 -8 L -24 -14 L -18 -14" fill=none stroke=var(--stroke-color) stroke-width=1.5 stroke-linecap=square class=node-1 style=animation-delay:1.5s />
<path d="M 24 8 L 24 14 L 18 14" fill=none stroke=var(--stroke-color) stroke-width=1.5 stroke-linecap=square class=node-1 style=animation-delay:1.5s />
</g>
</svg>
</div>
</body>
</html>
