<!doctype html>
<html lang=it>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Apex</title>
<style>:root{--bg-color:#f8f6f0;--stroke-color:#222222}body,html{margin:0;padding:0;background-color:var(--bg-color);display:flex;justify-content:center;align-items:center;height:100vh}.milestone-container{width:500px;height:500px;position:relative;display:flex;justify-content:center;align-items:center}@keyframes summit-breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}@keyframes core-float{0%,100%{transform:translateY(0) rotate(45deg) scale(1)}50%{transform:translateY(-8px) rotate(45deg) scale(1.1)}}@keyframes fragment-orbit{from{transform:rotate(0) translateX(18px) rotate(0)}to{transform:rotate(360deg) translateX(18px) rotate(-360deg)}}@keyframes aura-glow{0%,100%{opacity:.1;transform:scale(.9)}50%{opacity:.4;transform:scale(1.1)}}.summit-base{animation:summit-breathe 5s ease-in-out infinite;transform-origin:center;transform-box:fill-box}.new-core{animation:core-float 4s ease-in-out infinite;transform-origin:center;transform-box:fill-box}.orbit-fragment{animation:fragment-orbit 10s linear infinite;transform-origin:center;transform-box:fill-box}.aura{animation:aura-glow 6s ease-in-out infinite;transform-origin:center;transform-box:fill-box}</style>
</head>
<body>
<div class=milestone-container>
<svg width=100% height=100% viewBox="-50 -50 100 100" style=overflow:visible>
<defs>
<filter id=sketch x=-50% y=-50% width=200% height=200%>
<feTurbulence type=fractalNoise baseFrequency=0.04 numOctaves=2 result=noise />
<feDisplacementMap in=SourceGraphic in2=noise scale=3 xChannelSelector=R yChannelSelector=G />
</filter>
</defs>
<g id=tappa-15 class=milestone-node filter=url(#sketch)>
<circle cx=0 cy=-15 r=25 fill=none stroke=var(--stroke-color) stroke-width=1.5 stroke-dasharray="2 4" class=aura />
<g class=summit-base fill=none stroke=var(--stroke-color) stroke-width=3 stroke-linejoin=round>
<path d="M -30 30 L 30 30 L 25 22 L -25 22 Z"/>
<path d="M -20 22 L 20 22 L 15 14 L -15 14 Z"/>
<path d="M -10 14 L 10 14 L 0 0 Z" fill=var(--stroke-color) />
</g>
<g class=new-core>
<rect x=-6 y=-6 width=12 height=12 fill=var(--bg-color) stroke=var(--stroke-color) stroke-width=3 stroke-linejoin=round />
<circle cx=0 cy=0 r=1.5 fill=var(--stroke-color) />
</g>
<g class=orbit-fragment>
<rect x=-2 y=-2 width=4 height=4 fill=var(--stroke-color) transform=rotate(20) />
</g>
<g class=orbit-fragment style=animation-delay:-3.3s>
<rect x=-2 y=-2 width=4 height=4 fill=var(--stroke-color) transform=rotate(110) />
</g>
<g class=orbit-fragment style=animation-delay:-6.6s>
<rect x=-2 y=-2 width=4 height=4 fill=none stroke=var(--stroke-color) stroke-width=1.5 transform=rotate(240) />
</g>
<line x1=-35 y1=35 x2=35 y2=35 stroke=var(--stroke-color) stroke-width=1.5 stroke-dasharray="1 5"/>
</g>
</svg>
</div>
</body>
</html>
