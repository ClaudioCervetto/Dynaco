<!doctype html>
<html lang=it>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Sparks</title>
<style>:root{--bg-color:#f8f6f0;--stroke-color:#222222}body,html{margin:0;padding:0;background-color:var(--bg-color);display:flex;justify-content:center;align-items:center;height:100vh}.milestone-container{width:500px;height:500px;position:relative}.has-shadow .milestone-node{filter:drop-shadow(0px 8px 12px rgba(0,0,0,.3))}</style>
</head>
<body>
<div class=milestone-container>
<svg width=100% height=100% viewBox="-50 -50 100 100" style=overflow:visible>
<defs>
<filter id=sketch x=-50% y=-50% width=200% height=200%>
<feTurbulence type=fractalNoise baseFrequency=0.08 numOctaves=4 result=noise />
<feDisplacementMap in=SourceGraphic in2=noise scale=2.5 xChannelSelector=R yChannelSelector=G />
</filter>
</defs>
<g id=tappa-11 class=milestone-node filter=url(#sketch)>
<circle cx=0 cy=0 fill=none stroke=var(--stroke-color)>
<animate attributeName=r values="2.4; 10; 30; 30" keyTimes="0; 0.2; 0.8; 1" dur=4s begin=0.3s repeatCount=indefinite />
<animate attributeName=opacity values="0; 0.8; 0; 0" keyTimes="0; 0.2; 0.8; 1" dur=4s begin=0.3s repeatCount=indefinite />
<animate attributeName=stroke-width values="3; 2.37; 0.5; 0.5" keyTimes="0; 0.2; 0.8; 1" dur=4s begin=0.3s repeatCount=indefinite />
</circle>
<circle cx=0 cy=0 fill=none stroke=var(--stroke-color)>
<animate attributeName=r values="2.4; 10; 30; 30" keyTimes="0; 0.2; 0.8; 1" dur=4s begin=1.2s repeatCount=indefinite />
<animate attributeName=opacity values="0; 0.8; 0; 0" keyTimes="0; 0.2; 0.8; 1" dur=4s begin=1.2s repeatCount=indefinite />
<animate attributeName=stroke-width values="3; 2.37; 0.5; 0.5" keyTimes="0; 0.2; 0.8; 1" dur=4s begin=1.2s repeatCount=indefinite />
</circle>
<g>
<path fill=var(--stroke-color) stroke=var(--stroke-color) stroke-width=1.5 stroke-linejoin=round>
<animate attributeName=d values="
            M 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 Z;
            M 0 -24 L 4.8 -6.4 L 22.4 0 L 4.8 6.4 L 0 24 L -4.8 6.4 L -22.4 0 L -4.8 -6.4 Z;
            M 0 -15 L 3 -4 L 14 0 L 3 4 L 0 15 L -3 4 L -14 0 L -3 -4 Z;
            M 0 -15 L 3 -4 L 14 0 L 3 4 L 0 15 L -3 4 L -14 0 L -3 -4 Z;
            M 0 -18 L 3.6 -4.8 L 16.8 0 L 3.6 4.8 L 0 18 L -3.6 4.8 L -16.8 0 L -3.6 -4.8 Z;
            M 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 Z
        " keyTimes="0; 0.15; 0.3; 0.7; 0.85; 1" dur=4s repeatCount=indefinite />
<animate attributeName=opacity values="0; 1; 1; 1; 1; 0" keyTimes="0; 0.15; 0.3; 0.7; 0.85; 1" dur=4s repeatCount=indefinite />
</path>
<g transform=rotate(45)>
<path fill=var(--bg-color) stroke=var(--stroke-color) stroke-width=2 stroke-linejoin=round>
<animate attributeName=d values="
                M 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 Z;
                M 0 -16 L 4 -4 L 16 0 L 4 4 L 0 16 L -4 4 L -16 0 L -4 -4 Z;
                M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z;
                M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z;
                M 0 -12 L 3 -3 L 12 0 L 3 3 L 0 12 L -3 3 L -12 0 L -3 -3 Z;
                M 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 L 0 0 Z
            " keyTimes="0; 0.15; 0.3; 0.7; 0.85; 1" dur=4s begin=0.2s repeatCount=indefinite />
<animate attributeName=opacity values="0; 1; 1; 1; 1; 0" keyTimes="0; 0.15; 0.3; 0.7; 0.85; 1" dur=4s begin=0.2s repeatCount=indefinite />
</path>
</g>
<circle cx=0 cy=0 fill=var(--bg-color)>
<animate attributeName=r values="0; 4; 2.5; 2.5; 3; 0" keyTimes="0; 0.15; 0.3; 0.7; 0.85; 1" dur=4s repeatCount=indefinite />
<animate attributeName=opacity values="0; 1; 1; 1; 1; 0" keyTimes="0; 0.15; 0.3; 0.7; 0.85; 1" dur=4s repeatCount=indefinite />
</circle>
</g>
</g>
</svg>
</div>
</body>
</html>
